<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>N.E.L.S.O.N Dashboard</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="header">
  <span id="system-name">N·E·L·S·O·N</span>
  <span id="health-dot" class="dot-green"></span>
</div>

<div id="agents-row">
  <!-- filled by JS -->
</div>

<div id="tabs">
  <button class="tab active" onclick="showTab('board')">Board</button>
  <button class="tab" onclick="showTab('log')">Log</button>
  <button class="tab" onclick="showTab('health')">Health</button>
</div>

<div id="tab-board" class="tab-content active">
  <div id="kanban"></div>
</div>

<div id="tab-log" class="tab-content">
  <div id="log-feed"></div>
</div>

<div id="tab-health" class="tab-content">
  <div id="health-info"></div>
</div>

<div id="task-bar">
  <input type="text" id="task-input" placeholder="Giao task cho NÃO...">
  <button id="send-btn" onclick="sendTask()">Gửi</button>
</div>

<script src="app.js"></script>
</body>
</html>
