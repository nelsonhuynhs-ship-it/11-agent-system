name: Sync Data to VPS

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync all data files to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 14.225.207.145
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 180s
          script: |
            set -e
            echo "=== Data Sync $(date '+%H:%M') ==="

            TOKEN="${{ secrets.GH_DEPLOY_TOKEN }}"
            REPO="nelsonhuynhs-ship-it/FrieghtBrian"
            TAG="data-sync-v1"

            # Get all release assets
            ASSETS=$(curl -sL \
              -H "Authorization: token $TOKEN" \
              "https://api.github.com/repos/$REPO/releases/tags/$TAG" \
              | python3 -c "
            import sys, json
            data = json.load(sys.stdin)
            for a in data.get('assets', []):
                print(f\"{a['name']}|{a['url']}\")
            ")

            # Download each asset to correct directory
            for line in $ASSETS; do
              NAME=$(echo "$line" | cut -d'|' -f1)
              URL=$(echo "$line" | cut -d'|' -f2)

              case "$NAME" in
                *.parquet)
                  DIR="/opt/nelson/data/pricing"
                  ;;
                *cnee*|*shipper*|*contact*)
                  DIR="/opt/nelson/data/email"
                  ;;
                *)
                  DIR="/opt/nelson/data"
                  ;;
              esac

              mkdir -p "$DIR"
              echo "Downloading $NAME → $DIR/"
              curl -sL \
                -H "Authorization: token $TOKEN" \
                -H "Accept: application/octet-stream" \
                -o "$DIR/$NAME" \
                "$URL"
              ls -la "$DIR/$NAME"
            done

            echo "=== Restarting API ==="
            cd /opt/nelson/code
            docker compose restart nelson-api
            sleep 8

            # Health check
            API=$(curl -s http://localhost:8100/api/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','fail'))" 2>/dev/null || echo "fail")
            TIERS=$(curl -s http://localhost:8100/api/email-rate/campaign/tier-stats | python3 -c "import sys,json; print(json.load(sys.stdin).get('total',0))" 2>/dev/null || echo "0")
            echo "Health: API=$API | CNEE=$TIERS contacts"
            echo "=== Sync Done ==="
