name: Nelson Auto-Deploy to VPS

# ============================================================
#   NELSON FREIGHT — CI/CD Pipeline v3 (Docker)
#   Push to main → test → SSH VPS → docker compose up
# ============================================================

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VPS_HOST: 14.225.207.145
  VPS_USER: root
  PYTHON_VERSION: "3.11"

jobs:
  # ----------------------------------------------------------
  #  JOB 1: TEST
  # ----------------------------------------------------------
  test:
    name: "Kiem tra code"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install fastapi httpx pytest pytest-asyncio pydantic python-dotenv pandas openpyxl 2>/dev/null || true

      - name: Check Python syntax
        env:
          NELSON_DATA_DIR: /tmp/nelson-data
          NELSON_LOCAL_DIR: /tmp/nelson-local
          NELSON_MACHINE: vps
        run: |
          mkdir -p /tmp/nelson-data/{pricing,email,assets,bot,erp} /tmp/nelson-local/{logs,runtime}
          find api/ -name "*.py" -exec python3 -m py_compile {} \; && echo "OK: API"
          find shared/ -name "*.py" -exec python3 -m py_compile {} \; && echo "OK: shared"
          find email_engine/ -name "*.py" -exec python3 -m py_compile {} \; 2>/dev/null && echo "OK: email_engine" || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: WebApp build check
        run: |
          cd webapp
          npm ci --ignore-scripts
          npm run build && echo "OK: Next.js build"

      - name: Notify test result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COMMIT=$(echo "${{ github.event.head_commit.message }}" | cut -c1-60)
          [ "$STATUS" = "success" ] && MSG="OK Code sach" || MSG="FAIL Code loi"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${MSG} | ${COMMIT}" || true

  # ----------------------------------------------------------
  #  JOB 2: DEPLOY via Docker
  # ----------------------------------------------------------
  deploy:
    name: "Deploy VPS (Docker)"
    runs-on: ubuntu-latest
    needs: test
    if: success()

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 600s
          envs: GH_TOKEN
          script: |
            set -e
            echo "=== Nelson Docker Deploy $(date '+%H:%M %d/%m/%Y') ==="

            CODE="/opt/nelson/code"
            CLEAN_URL="https://github.com/nelsonhuynhs-ship-it/FrieghtBrian.git"
            mkdir -p "$CODE" /opt/nelson/data/email /opt/nelson/local/logs/email-engine /opt/nelson/local/runtime

            # 1. Git pull — token via ephemeral http.extraheader, never embedded in .git/config
            B64_AUTH=$(printf "x-access-token:%s" "$GH_TOKEN" | base64 -w0)
            AUTH_HEADER="AUTHORIZATION: basic $B64_AUTH"

            if [ ! -d "$CODE/.git" ]; then
              git -c http.extraheader="$AUTH_HEADER" clone "$CLEAN_URL" "$CODE"
            fi
            cd "$CODE"

            # Ensure remote URL clean (sanitize any leftover token from previous deploys)
            git remote set-url origin "$CLEAN_URL"

            # Fetch with ephemeral header (-c = runtime only, not saved to disk)
            git -c http.extraheader="$AUTH_HEADER" fetch origin main
            git reset --hard origin/main
            echo "[OK] Code: $(git log -1 --pretty='%h %s')"

            # Verify no token leak in .git/config
            if grep -qE "(ghp_|github_pat_|gho_|ghu_|ghs_|ghr_)" .git/config; then
              echo "[FAIL] Token leaked in .git/config!"
              grep -E "(ghp_|github_pat_|gho_|ghu_|ghs_|ghr_)" .git/config | sed 's/github_pat_[^@ ]*/REDACTED/g'
              exit 1
            fi
            echo "[OK] .git/config clean, no token embedded"

            # Clear sensitive env vars from memory for remaining steps
            unset B64_AUTH AUTH_HEADER GH_TOKEN

            # 2. Stop old systemctl services (migrate to Docker)
            systemctl stop nelson-api 2>/dev/null || true
            systemctl stop nelson-webapp3003 2>/dev/null || true
            systemctl disable nelson-api 2>/dev/null || true
            systemctl disable nelson-webapp3003 2>/dev/null || true
            echo "[OK] Old systemctl services stopped"

            # 3. Docker compose up
            cd "$CODE"
            docker rm -f nelson-api nelson-webapp 2>/dev/null || true
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose build --no-cache 2>&1 | tail -5
            docker compose up -d
            echo "[OK] Docker containers started"

            # 4. Wait + Health check
            sleep 8
            docker compose ps
            API_HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8100/ || echo "000")
            WEB_HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3003 2>/dev/null || echo "000")
            echo "Health: API=$API_HTTP WebApp=$WEB_HTTP"

            if [ "$API_HTTP" != "200" ] && [ "$API_HTTP" != "307" ]; then
              echo "[FAIL] API not responding — showing logs:"
              docker compose logs nelson-api --tail 30
              exit 1
            fi

            echo "=== Deploy DONE $(date '+%H:%M') ==="

      - name: Notify SUCCESS
        if: success()
        run: |
          COMMIT=$(echo "${{ github.event.head_commit.message }}" | cut -c1-60)
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Docker Deploy XONG! | ${COMMIT} | API: http://14.225.207.145:8100" || true

      - name: Notify FAILURE
        if: failure()
        run: |
          COMMIT=$(echo "${{ github.event.head_commit.message }}" | cut -c1-60)
          RUN="https://github.com/nelsonhuynhs-ship-it/FrieghtBrian/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Deploy THAT BAI! | ${COMMIT} | ${RUN}" || true
