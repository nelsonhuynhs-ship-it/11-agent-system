name: VPS Emergency Restart
on:
  workflow_dispatch:
jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Restart VPS services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 14.225.207.145
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 60s
          script: |
            echo "=== Emergency Restart ==="
            # Check Docker status
            docker ps -a 2>/dev/null || echo "Docker not running"
            
            cd /opt/nelson/code 2>/dev/null || exit 1
            
            # Restart Docker containers
            docker compose up -d 2>&1 | tail -5
            sleep 10
            docker compose ps
            
            # Fallback: restart old systemctl if Docker fails
            if ! curl -s http://localhost:8100/api/health > /dev/null 2>&1; then
              echo "Docker API failed, trying systemctl..."
              systemctl start nelson-api 2>/dev/null || true
            fi
            if ! curl -s http://localhost:3003 > /dev/null 2>&1; then
              echo "Docker WebApp failed, trying systemctl..."
              systemctl start nelson-webapp3003 2>/dev/null || true
            fi
            
            sleep 5
            echo "API: $(curl -s -o /dev/null -w '%{http_code}' http://localhost:8100/api/health)"
            echo "Web: $(curl -s -o /dev/null -w '%{http_code}' http://localhost:3003)"
            echo "=== Done ==="
