# ═════════════════════════════════════════════════════════════════════════════
# email_rules.yaml — Nelson Freight email templates
#
# Simple professional templates WITHOUT AI forecast/prediction.
# Rates come from auto_rate_builder (Parquet, Exp >= today).
# Nelson edits this file → next email uses the new template (no restart).
# ═════════════════════════════════════════════════════════════════════════════

version: 2

defaults:
  signature: |
    Best regards,

    Nelson Huynh — Nelson Freight (NVOCC)
    Asia-US Ocean Freight Specialist
    nelsonhuynhs@gmail.com | +84 xxx
  subject_suffix: "NELSON"

templates:

  # ─── 0. Cross-sell (10-lane default) ───────────────────────────────────
  # Matches bulk-send defaults from config/default_routes.yaml:fast_bulk_default.
  # Placed FIRST so it wins scoring when the full 10-lane menu is in play.
  # 10 lanes: USLAX + USSAV + USNYC + USHOU + USMIA + USTIW + 4 inland
  - id: default_cross_sell
    match:
      destinations: [USLAX, USSAV, USNYC, USHOU, USMIA, USTIW, USATL, USCHI, USDAL, USDEN]
      states: [any]
    subject: "Ocean Freight Update — Asia to USA | Week {{week}} | {{suffix}}"
    intro: |
      Dear {{first_name}},

      Please find our latest ocean freight rates for our main US corridors.
      Rates valid through {{earliest_exp}}.
    cta: |
      Please confirm booking 7 days before ETD.
      Reply with your specific lane for a detailed quote.

  # ─── 1. West Coast (USLAX/USLGB/USOAK) ─────────────────────────────────
  - id: west_coast
    match:
      destinations: [USLAX, USLGB, USOAK, USSEA]
      states: [any]
    subject: "Ocean Freight Update — {{pol}} to West Coast | Week {{week}} | {{suffix}}"
    intro: |
      Dear {{first_name}},

      Please find our latest ocean freight rates to the US,
      valid through end of the month.
    cta: |
      Please confirm booking 7 days before ETD.
      Any questions, feel free to reply.

  # ─── 2. East & Gulf Coast (USNYC/USSAV/USCHS/USHOU/etc.) ──────────────
  - id: east_coast
    match:
      destinations: [USNYC, USSAV, USCHS, USMIA, USHOU, USBAL, USJAX, USORF, USTPA]
      states: [any]
    subject: "Ocean Freight Update — {{pol}} to East Coast | Week {{week}} | {{suffix}}"
    intro: |
      Dear {{first_name}},

      Please find our latest ocean freight rates to the US,
      valid through end of the month.
    cta: |
      Please confirm booking 7 days before ETD.
      Any questions, feel free to reply.

  # ─── 3. Canada ──────────────────────────────────────────────────────────
  - id: canada
    match:
      destinations: [CAVAN, CATOR, CAMTR, CAHAL, CAPRR]
      states: [any]
    subject: "Ocean Freight Update — Asia to Canada | Week {{week}} | {{suffix}}"
    intro: |
      Dear {{first_name}},

      Please find our latest ocean freight rates to Canada,
      valid through end of the month.
    cta: |
      Vancouver / Prince Rupert / Montreal routing available.
      Please confirm booking 7 days before ETD.

  # ─── 4. Inland / Chicago / Dallas ──────────────────────────────────────
  - id: inland
    match:
      destinations: [USCHI, USDAL, USMEM, USDEN, USSLL, USKCI]
      states: [any]
    subject: "Ocean Freight + Inland Rates | Week {{week}} | {{suffix}}"
    intro: |
      Dear {{first_name}},

      Please find our latest ocean freight + inland delivery rates to the US,
      valid through end of the month.
    cta: |
      Rates include door delivery. Transit time varies by routing.
      Reply with your ZIP code for precise transit time estimate.

  # ─── 5. Default fallback (MUST be last) ─────────────────────────────────
  - id: default
    match:
      destinations: [any]
      states: [any]
    subject: "Ocean Freight Rate Update | Week {{week}} | {{suffix}}"
    intro: |
      Dear {{first_name}},

      Please find our latest ocean freight rates to the US,
      valid through end of the month.
    cta: |
      Please confirm booking 7 days before ETD.
      Any questions, feel free to reply.
