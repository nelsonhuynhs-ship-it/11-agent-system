# scanner.yaml — Pattern library for Inbox classifier
# Loaded by email_engine/scanner/classifier.py via load_patterns()
#
# Rule order (classifier.classify):
#   1. POSTMASTER_PATTERNS sender  OR  BOUNCE_PATTERNS subject         -> BOUNCE
#   2. UNSUBSCRIBE_PATTERNS (subject+body)                              -> UNSUBSCRIBE
#   3. AUTO_REPLY_PATTERNS subject                                      -> AUTO_REPLY
#   4. sender in cnee_master                                            -> REAL_REPLY
#   5. otherwise                                                        -> IRRELEVANT

scan:
  # Minutes of inbox history to walk each cycle. Scheduler default = 35.
  # Manual trigger via /api/inbox/scan-bounce can override with `hours` param (UI 24h/7d/30d).
  window_minutes: 35
  # Hard cap per cycle (safety against runaway). Raised to 500 to cover 30d manual scans.
  max_items: 500
  # Categories tag applied to processed items so we don't double-scan.
  processed_category: "Nelson-Scanned"
  # Outlook folder IDs to scan. 6=Inbox, 23=Junk Email (Outlook auto-moves many NDRs here).
  folders:
    - 6
    - 23

bounce:
  # Strict: only real postmaster domains. Removed "noreply@" / "no-reply@" — caused
  # false positives (LinkedIn, customer replies from noreply addresses).
  postmaster_patterns:
    - "postmaster@"
    - "mailer-daemon@"
    - "MAILER-DAEMON@"
  subject_patterns:
    - "delivery status notification"
    - "undelivered mail"
    - "undeliverable"
    - "mail delivery failed"
    - "mail delivery subsystem"
    - "returned mail"
    - "failure notice"
    - "delivery failure"
  # Sub-classify HARD vs SOFT after matching BOUNCE (used in handlers.extract_bounced_email pipeline).
  hard_keywords:
    - "does not exist"
    - "unknown user"
    - "invalid address"
    - "no such user"
    - "rejected"
    - "user unknown"
    - "address rejected"
    - "not found"
    - "invalid recipient"
  soft_keywords:
    - "mailbox full"
    - "temporarily"
    - "try again later"
    - "quota exceeded"
    - "over quota"
    - "service unavailable"
    - "too many connections"

auto_reply:
  # 2026-04-24: added carrier tracking subscriptions — YML/MSC/Maersk/etc send
  # daily tracking reports to addresses Nelson subscribed to. Not real replies.
  subject_patterns:
    - "out of office"
    - "automatic reply"
    - "auto-reply"
    - "auto reply"
    - "i am on vacation"
    - "currently out of"
    - "away from the office"
    - "ooo"
    - "đang nghỉ phép"
    - "vắng mặt"
    - "tracking report subscription"
    - "[tracking report"
    - "shipment tracking"
    - "container tracking update"
    - "vessel schedule"
    - "eta update"
  # Sender domains that ALWAYS classify as AUTO_REPLY (carrier systems, tracking bots).
  sender_domains:
    - "yangming.com"
    - "one-line.com"
    - "maersk.com"
    - "msc.com"
    - "cma-cgm.com"
    - "evergreen-marine.com"
    - "hapag-lloyd.com"
    - "coscoshipping.com"
    - "oocl.com"
    - "hmm21.com"
    - "zim.com"
    - "pilship.com"
    - "tslines.com"
    - "wanhai.com"

unsubscribe:
  patterns:
    - "unsubscribe"
    - "stop email"
    - "stop emailing"
    - "remove me"
    - "do not email"
    - "do not contact"
    - "không nhận email"
    - "không gửi email nữa"
    - "huỷ đăng ký"
    - "huy dang ky"

# Regex fragments for bounce recipient extraction (handlers.extract_bounced_email).
bounce_regex:
  - '(?:could not be delivered|undelivered|failed).*?([\w\.\-]+@[\w\.\-]+)'
  - 'Final-Recipient:\s*rfc822;\s*([\w\.\-]+@[\w\.\-]+)'
  - '(?:to|for|recipient)[:\s]+([\w\.\-]+@[\w\.\-]+)'
  - 'Original-Recipient:\s*rfc822;\s*([\w\.\-]+@[\w\.\-]+)'

telegram:
  # Batch window: collect alerts within this many seconds before flushing as a single message.
  batch_window_seconds: 300
  rate_limit_per_minute: 20
