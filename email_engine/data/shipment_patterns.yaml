# ============================
# IDENTIFIER PATTERNS
# (ordered by specificity — most specific first)
# ============================
identifier_patterns:

  - id: HBL_ONE_HAPAG
    regex: '\b(P(?:NYC|SAV|HOU|DEN|CHS|SEA|OMA|YTO|ELP|MAN|LAX)[0-9]{7,12})\b'
    type: HBL
    carrier_mapping:
      PNYC: "ONE/Hapag"
      PSAV: "ONE/Hapag"
      PHOU: "ONE/Hapag"
      PDEN: "ONE/Hapag"
      PCHS: "ONE/Hapag"
      PSEA: "ONE/Hapag"
      POMA: "ONE/Hapag"
      PYTO: "ONE/Hapag"
      PELP: "CMA CGM"
    examples:
      - PNYC26010385
      - PSAV26020325
      - PHOU26020455
      - PDEN26020517
      - PCHS26030364
      - PSEA26020066
      - PYTO26010027
      - PELP26030260

  - id: HBL_HAPAG_MAPI
    regex: '\b(HLCU[A-Z]{3}[0-9]{9,})\b'
    type: HBL
    carrier_mapping:
      HLCU: "Hapag-Lloyd"
    examples:
      - HLCUBKK260281582

  - id: HBL_ZIM
    regex: '\b(ZIMU(?:HCM|HAI|SGN)[0-9]{8,})\b'
    type: HBL
    carrier_mapping:
      ZIMUHCM: "ZIM"
      ZIMUHAI: "ZIM"
    examples:
      - ZIMUHCM80610801
      - ZIMUHCM80618691
      - ZIMUHAI80201821

  - id: HBL_YANG_HANG
    regex: '\b(HANG[0-9]{8,12})\b'
    type: HBL_or_BKG
    carrier_mapping:
      HANG: "Yang Ming / Evergreen"
    examples:
      - HANG17369900
      - HANG25448600
      - HANG26062600

  - id: HBL_EVERGREEN_ESLV
    regex: '\b(ESLV[A-Z0-9]{5,15})\b'
    type: HBL
    carrier_mapping:
      ESLV: "Evergreen"
    examples:
      - ESLVNESAL003946

  - id: BKG_CARRIER_SGN
    regex: '\b(SGN[0-9]{7,10})\b'
    type: BKG
    examples:
      - SGN3084097

  - id: BKG_CARRIER_HANFG
    regex: '\b(HANFG[0-9]{7,10})\b'
    type: BKG
    carrier_mapping:
      HANFG: "ONE"
    examples:
      - HANFG2303400

  - id: BKG_NAFOOD_EBKG
    regex: '\bEBKG([0-9]{8,12})\b'
    type: BKG
    examples:
      - EBKG14870911

  - id: BKG_NUMERIC_GENERIC
    regex: '\bBKG[\s#]*([0-9]{6,10})\b'
    type: BKG
    examples:
      - "BKG 14380157"
      - "BKG 30167565"
      - "BKG 12766472"

  - id: CONTAINER_ISO
    regex: '\b([A-Z]{4}[0-9]{7})\b'
    type: CONTAINER
    examples: []


