version: 2.0
updated_at: 2025-01-30

notes:
  - "CY-CY shipment lifecycle rules"
  - "Subject keywords may be references, body is authoritative"
  - "DRAFT B/L#xxxx after ATD is identifier only, not lifecycle event"

global:
  identifiers:
    bkg_regex: '(?i)\b[A-Z]{2,6}\d{6,12}\b'
    bkg_ignore_regex:
      - '(?i)\(\s*i\/o\s+[A-Z]{2,6}\d{6,12}\s*\)'

# =========================
# LIFECYCLE PRECEDENCE (LOW → HIGH)
# =========================
precedence:
  - BKG_ISSUED
  - DRAFT_BL_ISSUED
  - DRAFT_BL_CONFIRMED
  - LOADED
  - ATD
  - DN_SENT
  - INVOICE_ISSUED
  - PAYMENT_REQUESTED
  - PAYMENT_CONFIRMED
  - COMPLETED

# =========================
# CONTEXT GUARDS
# =========================
context_guards:

  late_stage_signals:
    any_keywords:
      - "update atd"
      - "atd"
      - "vessel departed"
      - "dn"
      - "debit"
      - "invoice"
      - "e-invoice"
      - "payment"

  draft_bl_reference_only:
    pattern: '(?i)draft\s*b\/l\s*#\s*[A-Z0-9]+'

# =========================
# EVENTS
# =========================
events:

  - id: BKG_ISSUED
    priority: 10
    match:
      any_keywords:
        - "booking confirmation"
        - "bkg confirmed"

  - id: DRAFT_BL_ISSUED
    priority: 30
    match:
      any_keywords:
        - "draft bl"
        - "bill nháp"
      exclude_keywords:
        - "confirm"
        - "ok"

  - id: DRAFT_BL_CONFIRMED
    priority: 35
    match:
      any_keywords:
        - "draft ok"
        - "confirm draft"
        - "xác nhận draft"

  - id: LOADED
    priority: 50
    match:
      any_keywords:
        - "loaded on board"
        - "đã lên tàu"

  - id: ATD
    priority: 60
    match:
      any_keywords:
        - "update atd"
        - "atd"
        - "vessel departed"
      exclude_keywords:
        - "etd"

  - id: DN_SENT
    priority: 70
    match:
      any_keywords:
        - "dn"
        - "debit note"
        - "giấy báo tiền"

  - id: INVOICE_ISSUED
    priority: 80
    match:
      any_keywords:
        - "invoice"
        - "e-invoice"
        - "xuất hóa đơn"

  - id: PAYMENT_REQUESTED
    priority: 90
    match:
      any_keywords:
        - "please pay"
        - "payment request"

  - id: PAYMENT_CONFIRMED
    priority: 100
    match:
      any_keywords:
        - "payment received"
        - "paid"

derived_states:
  - id: COMPLETED
    condition:
      requires_events:
        - PAYMENT_CONFIRMED
