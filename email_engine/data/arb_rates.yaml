# ARB Surcharges — Cross-Origin Pricing
# =========================================================
# Structure: origin_port → carrier → contract_type → container_type → USD amount
#
# Origins supported:
#   shanghai, ningbo          → China
#   lat_krabang               → Thailand (ICD Lat Krabang)
#   phnom_penh                → Cambodia
#   port_klang                → Malaysia
#
# Contract types:
#   FAK_SOC  = Freight All Kinds, Shipper-Owned Container
#   FAK_COC  = Freight All Kinds, Carrier-Owned Container
#   FIX      = Fixed-rate contract
#
# Container types: 20GP, 40HQ
#
# NOTE: These are ARB *surcharges* added on top of HCM/HPH base rates.
#       Nelson: replace placeholder values with actual carrier contract rates.
# =========================================================

