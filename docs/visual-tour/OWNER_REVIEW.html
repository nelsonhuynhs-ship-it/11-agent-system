.btn-nav { background: #333; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
.btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

const allRules = [...DOMAIN_DATA, ...DOMAIN_ERP, ...DOMAIN_EMAIL, ...DOMAIN_CODE];
const STORAGE_KEY = 'nelson_domain_review_v1';

let currentIndex = 0;
let decisions = {};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      decisions = data.decisions || {};
      currentIndex = data.currentIndex || 0;
    }
  } catch(e) {}
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    decisions, currentIndex, savedAt: new Date().toISOString()
  }));
}

function getDecidedCount() {
  return Object.keys(decisions).filter(k => decisions[k]).length;
}

function renderCard(index) {
  const container = document.getElementById('cardContainer');
  if (index >= allRules.length) {
    document.getElementById('cardContainer').style.display = 'none';
    document.getElementById('completeSection').style.display = 'block';
    updateProgress();
    return;
  }
  const rule = allRules[index];
  const decided = decisions[rule.id];
  container.innerHTML = `
    <div class="card">
      <span class="domain-badge domain-${rule.domain}">${rule.domain}</span>
      <div class="rule-number">Rule ${index + 1}/20 — ${rule.id}</div>
      <div class="rule-title">${rule.title}</div>
      <div class="rule-content">${rule.content.replace(/\n/g, '<br>')}
        ${rule.consequence ? `<div class="rule-consequence">⚠️ ${rule.consequence}</div>` : ''}
      </div>
      ${rule.details ? `<div class="detail-toggle" onclick="toggleDetail(this)">▼ Detailed (em handle)</div><div class="detail-content">${rule.details}</div>` : ''}
      <div class="actions">
        <button class="btn btn-correct" onclick="decide('${rule.id}', 'correct')" ${decided === 'correct' ? 'style="opacity:0.5"' : ''}>✅ Đúng</button>
        <button class="btn btn-edit" onclick="decide('${rule.id}', 'edit')" ${decided === 'edit' ? 'style="opacity:0.5"' : ''}>✏️ Sửa</button>
        <button class="btn btn-wrong" onclick="decide('${rule.id}', 'wrong')" ${decided === 'wrong' ? 'style="opacity:0.5"' : ''}>❌ Sai</button>
      </div>
      <div class="footer-nav">
        <button class="btn-nav" onclick="prev()" ${index === 0 ? 'disabled' : ''}>← Prev</button>
        <span class="count-badge">${getDecidedCount()}/20 đã duyệt</span>
        <button class="btn-nav" onclick="next()">Next →</button>
      </div>
    </div>
  `;
  updateProgress();
}

function updateProgress() {
  const total = allRules.length;
  const decided = getDecidedCount();
  const pct = Math.round((currentIndex / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  const minsLeft = Math.ceil((total - currentIndex) * 0.5);
  document.getElementById('progressText').textContent = `${currentIndex} / ${total} rules (${minsLeft} phút còn lại)`;
}

function decide(id, value) {
  decisions[id] = value;
  saveState();
  next();
}

function next() {
  if (currentIndex < allRules.length) currentIndex++;
  saveState();
  renderCard(currentIndex);
}

function prev() {
  if (currentIndex > 0) currentIndex--;
  saveState();
  renderCard(currentIndex);
}

function toggleDetail(el) {
  const content = el.nextElementSibling;
  content.classList.toggle('show');
  el.textContent = content.classList.contains('show') ? '▲ Detailed (em handle)' : '▼ Detailed (em handle)';
}

function exportJSON() {
  const approved = Object.entries(decisions).map(([id, decision]) => {
    const rule = allRules.find(r => r.id === id);
    return { id, domain: rule?.domain, title: rule?.title, decision, reviewedAt: new Date().toISOString() };
  }).filter(r => r.decision);
  const json = JSON.stringify({ exportedAt: new Date().toISOString(), total: approved.length, rules: approved }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'OWNER_APPROVED.json';
  a.click();
  URL.revokeObjectURL(url);
  document.getElementById('exportStatus').textContent = '✓ Đã xuất OWNER_APPROVED.json — ' + approved.length + ' rules';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight') decide(allRules[currentIndex]?.id, 'correct');
  if (e.key === 'ArrowLeft') decide(allRules[currentIndex]?.id, 'wrong');
  if (e.key === 'ArrowUp') decide(allRules[currentIndex]?.id, 'edit');
  if (e.key === 'n' || e.key === 'N') next();
  if (e.key === 'p' || e.key === 'P') prev();
});

loadState();
renderCard(currentIndex);
</script>
</body>
</html>
