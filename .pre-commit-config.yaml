# Pre-commit hooks for Nelson Freight ERP
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: pytest-collect-only
        name: pytest collection check
        entry: python -m pytest tests/ --collect-only -q
        language: system
        pass_filenames: false
        files: ^tests/
        description: "Verify all pytest tests are collectible (no sys.exit crashes)"

      - id: no-sys-exit-in-tests
        name: no sys.exit in test files
        entry: grep -r "sys.exit" tests/test_*.py
        language: system
        pass_filenames: false
        files: ^tests/test_.*\.py$
        description: "Ensure no sys.exit() remains in pytest test files"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
